services:
  - type: web
    name: fitness-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_TZ
        value: Europe/Kyiv
      - key: DB_PATH
        value: fitness_bot.db
